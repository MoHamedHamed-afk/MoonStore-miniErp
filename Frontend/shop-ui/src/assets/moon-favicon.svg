<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Moon Store favicon">
  <defs>
    <radialGradient id="moonGlow" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#f4f0ff"/>
      <stop offset="45%" stop-color="#ddd1ff"/>
      <stop offset="100%" stop-color="#9b8ec7"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="19" fill="url(#moonGlow)" filter="url(#softGlow)"/>
  <circle cx="24" cy="24" r="4" fill="#8f84bb" opacity=".28"/>
  <circle cx="36" cy="34" r="3" fill="#8f84bb" opacity=".22"/>
  <circle cx="41" cy="23" r="2.5" fill="#8f84bb" opacity=".18"/>
</svg>
