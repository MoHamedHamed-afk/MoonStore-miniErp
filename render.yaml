services:
  - type: web
    name: moonstore-backend
    runtime: docker
    plan: free
    rootDir: Backend/ShopApi
    healthCheckPath: /health
    envVars:
      - key: APP_DATA_ROOT
        value: /tmp/moonstore-data
      - key: SQLITE_PATH
        value: /tmp/moonstore-data/shop.db
      - key: UPLOADS_PATH
        value: /tmp/moonstore-data/uploads
      - key: Cloudinary__CloudName
        sync: false
      - key: Cloudinary__ApiKey
        sync: false
      - key: Cloudinary__ApiSecret
        sync: false
      - key: Cloudinary__Folder
        value: moon-store/products
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: ShopApi
      - key: Jwt__Audience
        value: ShopApp
      - key: Seed__AdminPassword
        sync: false
      - key: Seed__ModeratorPassword
        sync: false
      - key: Seed__BackupAdminPassword
        sync: false
