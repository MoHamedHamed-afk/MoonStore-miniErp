services:
  - type: web
    name: moonstore-backend
    runtime: docker
    rootDir: Backend/ShopApi
    healthCheckPath: /health
    disk:
      name: moonstore-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_DATA_ROOT
        value: /var/data
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: ShopApi
      - key: Jwt__Audience
        value: ShopApp
